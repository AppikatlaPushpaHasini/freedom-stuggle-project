<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Freedom and Struggle of India</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f8ff;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    .map-container {
      text-align: center;
    }
    .modal-content {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
    }
    .modal-img {
      width: 100%;
      height: auto;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>Freedom and Struggle of India</h1>

<div class="map-container">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/India_Map_Blank_without_boundaries.svg/1024px-India_Map_Blank_without_boundaries.svg.png" usemap="#india-map" alt="India Map" width="600">
  <map name="india-map">
    <area shape="rect" coords="220,180,260,220" href="#" alt="Maharashtra"
      data-state="Maharashtra"
      data-description="Maharashtra was home to great freedom fighters like Bal Gangadhar Tilak and Gopal Krishna Gokhale."
      data-image="https://upload.wikimedia.org/wikipedia/commons/2/29/Bal_Gangadhar_Tilak.jpg">
      
    <area shape="rect" coords="320,140,360,180" href="#" alt="West Bengal"
      data-state="West Bengal"
      data-description="West Bengal was a center of revolutionary activities with leaders like Subhas Chandra Bose."
      data-image="https://upload.wikimedia.org/wikipedia/commons/6/6f/Subhas_Chandra_Bose_NRB.jpg">
      
    <area shape="rect" coords="280,240,320,280" href="#" alt="Tamil Nadu"
      data-state="Tamil Nadu"
      data-description="Tamil Nadu contributed leaders like V. O. Chidambaram Pillai and Subramania Bharati."
      data-image="https://upload.wikimedia.org/wikipedia/commons/7/76/Subramania_Bharati_1940.jpg">
  </map>
</div>

<!-- Modal -->
<div class="modal fade" id="infoModal" tabindex="-1" role="dialog" aria-labelledby="modalTitle" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content p-3">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">State Name</h5>
        <button type="button" class="close" data-dismiss="modal">&times;</button>
      </div>
      <div class="modal-body">
        <img id="modalImage" src="" alt="Freedom Fighter" class="modal-img mb-3">
        <p id="modalDescription"></p>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.querySelectorAll('area').forEach(area => {
    area.addEventListener('click', function (e) {
      e.preventDefault();
      const state = this.getAttribute('data-state');
      const description = this.getAttribute('data-description');
      const image = this.getAttribute('data-image');

      document.getElementById('modalTitle').textContent = state;
      document.getElementById('modalDescription').textContent = description;
      document.getElementById('modalImage').src = image;

      $('#infoModal').modal('show');
    });
  });
</script>

</body>
</html>
